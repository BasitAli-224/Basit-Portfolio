<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basit Ali — Video Editor & Motion Graphics Artist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <!-- DO NOT EDIT THIS FILE FOR CONTENT — edit site-content.js instead -->
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00dddd;--teal-dim:#00aaaa;--purple:#c084fc;
  --bg:#080b0e;--bg2:#0d1117;--card:#0f1318;--card2:#141a20;
  --on-surface:#ffffff;--muted:#8a9ab0;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--on-surface);overflow-x:hidden;cursor:none}

/* ── Custom Cursor ── */
#cursor-dot{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--teal);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--teal),0 0 20px rgba(0,221,221,0.4);transition:opacity .3s}
#cursor-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(0,221,221,0.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease),border-color .3s ease,opacity .3s}
#cursor-ring.big{width:56px;height:56px;border-color:var(--teal);background:rgba(0,221,221,0.04)}

/* ── Particle Canvas ── */
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}

/* ── Scanline Overlay ── */
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px)}

/* ── Scroll Reveal ── */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .75s var(--ease),transform .75s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity .75s var(--ease),transform .75s var(--ease)}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity .75s var(--ease),transform .75s var(--ease)}
.reveal-right.visible{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(.93);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.reveal-scale.visible{opacity:1;transform:scale(1)}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;background:rgba(8,11,14,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,221,221,.08);transition:background .4s ease,box-shadow .4s ease}
nav.scrolled{background:rgba(8,11,14,.97);box-shadow:0 4px 40px rgba(0,0,0,.5)}
.nav-logo{font-weight:900;font-size:1.1rem;color:var(--teal);letter-spacing:.06em;text-decoration:none;position:relative}
.nav-logo::after{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:1px;background:var(--teal);transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease);box-shadow:0 0 8px var(--teal)}
.nav-logo:hover::after{transform:scaleX(1)}
.nav-links{display:flex;list-style:none;gap:2rem}
.nav-links a{font-size:.85rem;font-weight:500;color:var(--muted);text-decoration:none;padding-bottom:3px;border-bottom:2px solid transparent;transition:color .3s ease,border-color .3s ease}
.nav-links a.active{color:var(--on-surface);border-bottom-color:var(--teal)}
.nav-links a:hover{color:var(--on-surface)}
.nav-cta{background:var(--teal);color:#000;font-weight:700;font-size:.78rem;padding:.5rem 1.3rem;border-radius:6px;text-decoration:none;letter-spacing:.02em;position:relative;overflow:hidden;transition:box-shadow .3s ease,transform .3s ease}
.nav-cta::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-100%)}
.nav-cta:hover::before{animation:shimmer .55s ease forwards}
.nav-cta:hover{box-shadow:0 0 22px rgba(0,221,221,.6);transform:translateY(-1px)}
@keyframes shimmer{to{transform:translateX(100%)}}

/* ── HERO ── */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;background:var(--bg);padding-top:60px;z-index:1}
.hero-hexgrid{position:absolute;inset:0;z-index:0;background-image:radial-gradient(circle,rgba(0,221,221,.12) 1px,transparent 1px);background-size:28px 28px;animation:hexDrift 22s linear infinite}
@keyframes hexDrift{0%{background-position:0 0}100%{background-position:56px 56px}}
.blob{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:1}
.blob-a{width:700px;height:220px;background:rgba(0,200,200,.14);bottom:14%;left:-10%;border-radius:60% 40% 55% 45%;animation:blobA 9s ease-in-out infinite alternate}
.blob-b{width:520px;height:180px;background:rgba(192,132,252,.12);top:20%;right:-6%;border-radius:40% 60% 45% 55%;animation:blobB 12s ease-in-out infinite alternate}
.blob-c{width:300px;height:140px;background:rgba(0,180,180,.08);top:40%;left:28%;animation:blobC 14s ease-in-out infinite alternate}
@keyframes blobA{0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.75}50%{transform:translate(30px,-20px) scale(1.06) rotate(8deg);opacity:1}100%{transform:translate(-15px,12px) scale(.96) rotate(-5deg);opacity:.7}}
@keyframes blobB{0%{transform:translate(0,0) scale(1) rotate(0deg);opacity:.7}50%{transform:translate(-25px,18px) scale(1.08) rotate(-10deg);opacity:.95}100%{transform:translate(15px,-10px) scale(.95) rotate(6deg);opacity:.65}}
@keyframes blobC{0%{transform:translate(0,0) scale(1);opacity:.6}50%{transform:translate(20px,-15px) scale(1.1);opacity:.9}100%{transform:translate(-10px,10px) scale(.92);opacity:.55}}
.hero-sweep{position:absolute;top:0;left:-60%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,221,221,.03),transparent);animation:sweepLine 7s ease-in-out infinite;z-index:2;pointer-events:none}
@keyframes sweepLine{0%{left:-60%}100%{left:160%}}
.hero-inner{position:relative;z-index:3;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:3rem;width:100%;max-width:1200px;margin:0 auto;padding:80px 40px 60px}
.hero-left{display:flex;flex-direction:column;gap:1.2rem}
.available-badge{display:inline-flex;align-items:center;gap:7px;width:fit-content;border:1px solid rgba(0,221,221,.6);padding:4px 12px;border-radius:4px;font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);animation:fadeSlideX 1s var(--ease) .2s both}
@keyframes fadeSlideX{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.available-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 rgba(0,221,221,.5)}50%{opacity:.5;transform:scale(.7);box-shadow:0 0 0 6px rgba(0,221,221,0)}}
.hero-name{font-size:clamp(3rem,7.5vw,5.8rem);font-weight:900;line-height:1;letter-spacing:-.025em;animation:fadeSlideY 1s var(--ease) .4s both;position:relative}
@keyframes fadeSlideY{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hero-name .teal{color:var(--teal);position:relative}
.hero-name .teal::after{content:attr(data-text);position:absolute;left:0;top:0;color:var(--purple);clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%);animation:glitch 5s ease-in-out infinite;opacity:0}
@keyframes glitch{0%,88%,100%{opacity:0;transform:translateX(0)}90%{opacity:.7;transform:translateX(-4px)}92%{opacity:.7;transform:translateX(4px)}94%{opacity:0}}
.hero-roles{display:flex;flex-direction:column;gap:.2rem;animation:fadeSlideX2 1s var(--ease) .6s both}
@keyframes fadeSlideX2{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.hero-roles span{font-size:1.05rem;font-weight:400;color:var(--muted);line-height:1.6;transition:color .5s ease}
.hero-roles span.highlight{color:var(--teal)}
.hero-btns{display:flex;gap:1rem;margin-top:.5rem;animation:fadeSlideY2 1s var(--ease) .8s both}
@keyframes fadeSlideY2{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.btn-teal{display:inline-block;background:var(--teal);color:#000;font-weight:700;font-size:.85rem;padding:.7rem 1.75rem;border-radius:6px;border:none;cursor:none;text-decoration:none;position:relative;overflow:hidden;transition:box-shadow .35s var(--ease),transform .35s var(--ease)}
.btn-teal::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:translateX(-100%)}
.btn-teal:hover::before{animation:shimmer .55s ease forwards}
.btn-teal:hover{box-shadow:0 0 32px rgba(0,221,221,.6),0 0 60px rgba(0,221,221,.2);transform:translateY(-2px)}
.btn-outline{display:inline-block;background:transparent;color:var(--on-surface);font-weight:600;font-size:.85rem;padding:.7rem 1.75rem;border-radius:6px;border:1px solid rgba(255,255,255,.22);cursor:none;text-decoration:none;transition:border-color .3s ease,background .3s ease,box-shadow .3s ease}
.btn-outline:hover{border-color:rgba(0,221,221,.5);background:rgba(0,221,221,.05);box-shadow:0 0 16px rgba(0,221,221,.1)}
.hero-right{display:flex;justify-content:center;align-items:center;animation:heroImgIn 1.2s var(--ease) .5s both}
@keyframes heroImgIn{from{opacity:0;transform:scale(.9) translateX(30px)}to{opacity:1;transform:scale(1) translateX(0)}}
.hero-img-wrap{position:relative;width:100%;max-width:580px;border-radius:16px;overflow:hidden;animation:imgGlow 4s ease-in-out infinite alternate}
@keyframes imgGlow{0%{box-shadow:0 0 0 1px rgba(0,221,221,.1),0 0 60px rgba(0,221,221,.06),0 30px 80px rgba(0,0,0,.65)}100%{box-shadow:0 0 0 1px rgba(0,221,221,.2),0 0 100px rgba(0,221,221,.15),0 30px 80px rgba(0,0,0,.65)}}
.hero-img-wrap::before,.hero-img-wrap::after{content:'';position:absolute;width:28px;height:28px;z-index:5;pointer-events:none}
.hero-img-wrap::before{top:0;left:0;border-top:2px solid var(--teal);border-left:2px solid var(--teal)}
.hero-img-wrap::after{bottom:0;right:0;border-bottom:2px solid var(--purple);border-right:2px solid var(--purple)}
.hero-img-wrap img{width:100%;height:auto;display:block}
.hero-img-placeholder{width:100%;padding-top:62%;position:relative;background:linear-gradient(135deg,#0d1520,#111a28);border-radius:16px}
.hero-img-placeholder span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.78rem;color:var(--muted);flex-direction:column;gap:6px}

/* ── WORKS SECTION ── */
.works-section{background:#0d1117;padding:90px 40px;position:relative;overflow:hidden}
.works-section::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--teal),var(--purple),transparent);animation:lineGlow 3s ease-in-out infinite alternate}
@keyframes lineGlow{0%{opacity:.4}100%{opacity:1}}
.works-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;margin-bottom:2.5rem;max-width:1200px;margin-left:auto;margin-right:auto}
.works-header-left h2{font-size:clamp(2rem,4vw,2.8rem);font-weight:800;margin-bottom:.6rem}
.works-header-left h2 .purple{color:var(--purple)}
.works-header-left p{font-size:.87rem;color:var(--muted);max-width:380px;line-height:1.65}
.filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:flex-start}
.chip{background:rgba(0,221,221,.08);color:var(--teal);border:1px solid rgba(0,221,221,.2);font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:4px;cursor:none;transition:background .3s ease,box-shadow .3s ease,transform .3s ease}
.chip.active,.chip:hover{background:rgba(0,221,221,.18);box-shadow:0 0 16px rgba(0,221,221,.25);transform:translateY(-1px)}
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;max-width:1200px;margin:0 auto}
.project-card{background:var(--card);border-radius:14px;overflow:hidden;cursor:none;border:1px solid rgba(255,255,255,.05);transition:transform .5s var(--ease),box-shadow .5s var(--ease),border-color .4s ease;transform-style:preserve-3d;position:relative}
.project-card::after{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(0,221,221,.06),rgba(192,132,252,.04));opacity:0;transition:opacity .4s ease;pointer-events:none}
.project-card:hover{box-shadow:0 0 50px rgba(0,221,221,.12),0 20px 50px rgba(0,0,0,.5);border-color:rgba(0,221,221,.12)}
.project-card:hover::after{opacity:1}
.card-thumb{position:relative;padding-top:58%;overflow:hidden;background:#0a0f14}
.card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease),filter .5s ease;filter:brightness(.85) saturate(.9)}
.project-card:hover .card-thumb img{transform:scale(1.09);filter:brightness(1) saturate(1.1)}
.card-badge{position:absolute;top:12px;right:12px;background:rgba(0,221,221,.15);color:var(--teal);border:1px solid rgba(0,221,221,.35);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;backdrop-filter:blur(6px);z-index:2;transition:background .3s ease,box-shadow .3s ease}
.project-card:hover .card-badge{background:rgba(0,221,221,.25);box-shadow:0 0 10px rgba(0,221,221,.3)}
.card-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:opacity .4s var(--ease)}
.project-card:hover .card-play-overlay{opacity:1}
.play-btn-circle{width:54px;height:54px;border-radius:50%;background:rgba(0,221,221,.15);backdrop-filter:blur(8px);border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;transition:transform .35s var(--ease),box-shadow .35s var(--ease)}
.project-card:hover .play-btn-circle{transform:scale(1.15);box-shadow:0 0 30px rgba(0,221,221,.6),0 0 60px rgba(0,221,221,.2)}
.play-btn-circle svg{width:20px;height:20px;fill:var(--teal);margin-left:3px}
.thumb-ph{position:absolute;inset:0;background:linear-gradient(135deg,#0a0f16,#121a22);display:flex;align-items:center;justify-content:center}
.thumb-ph svg{width:36px;height:36px;fill:none;stroke:rgba(0,221,221,.2);stroke-width:1.5}
.card-body{padding:1rem 1.25rem 1.25rem}
.card-title{font-size:1rem;font-weight:700;color:var(--on-surface);margin-bottom:.4rem;transition:color .3s ease}
.project-card:hover .card-title{color:var(--teal)}
.card-desc{font-size:.77rem;color:var(--muted);line-height:1.55}
.project-card.hidden{display:none}

/* ── COLLAB ── */
.collab-section{background:var(--bg);padding:90px 40px;text-align:center;position:relative;overflow:hidden}
.collab-section::before{content:'';position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(0,221,221,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,221,221,.035) 1px,transparent 1px);background-size:60px 60px;animation:gridMove 14s linear infinite;pointer-events:none}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:60px 60px}}
.collab-section>*{position:relative;z-index:1}
.collab-section h2{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;margin-bottom:.5rem}
.collab-section h2 .teal{color:var(--teal)}
.collab-section>p{font-size:.88rem;color:var(--muted);margin-bottom:3rem}
.collab-grid{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;max-width:1100px;margin:0 auto}
.collab-card{background:var(--card);border:1px solid rgba(0,221,221,.14);border-radius:12px;padding:1.5rem 1.25rem;flex:1;min-width:160px;max-width:195px;text-align:center;transition:border-color .35s ease,box-shadow .35s ease,transform .35s ease;position:relative;overflow:hidden}
.collab-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at center,rgba(0,221,221,.06) 0%,transparent 60%);transform:scale(0);transition:transform .5s var(--ease);pointer-events:none}
.collab-card:hover::before{transform:scale(1)}
.collab-card:hover{border-color:rgba(0,221,221,.5);box-shadow:0 0 30px rgba(0,221,221,.12);transform:translateY(-6px)}
.collab-card.highlighted{border-color:rgba(0,221,221,.4)}
.collab-icon{width:44px;height:44px;margin:0 auto 1rem;background:rgba(0,221,221,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .3s ease,box-shadow .3s ease,transform .4s var(--ease)}
.collab-card:hover .collab-icon{background:rgba(0,221,221,.18);box-shadow:0 0 20px rgba(0,221,221,.25);transform:scale(1.15) rotate(5deg)}
.collab-icon svg{width:22px;height:22px;stroke:var(--teal);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.collab-card h3{font-size:.87rem;font-weight:700;color:var(--on-surface);margin-bottom:.45rem}
.collab-card p{font-size:.73rem;color:var(--muted);line-height:1.55}

/* ── CONTACT ── */
.contact-section{background:#0d1117;padding:90px 40px;position:relative;overflow:hidden}
.contact-section::before{content:'';position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 80% 50%,rgba(0,221,221,.04) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(192,132,252,.04) 0%,transparent 60%);pointer-events:none}
.contact-section>*{position:relative;z-index:1}
.contact-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.1fr;gap:4rem;align-items:start}
.contact-left h2{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;line-height:1.15;margin-bottom:1rem}
.contact-left h2 .teal{color:var(--teal)}
.contact-left>p{font-size:.88rem;color:var(--muted);line-height:1.65;margin-bottom:2rem;max-width:380px}
.contact-meta{display:flex;flex-direction:column;gap:.85rem}
.contact-meta-item{display:flex;align-items:center;gap:10px}
.meta-icon{width:34px;height:34px;background:rgba(0,221,221,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s ease,box-shadow .3s ease}
.contact-meta-item:hover .meta-icon{background:rgba(0,221,221,.18);box-shadow:0 0 14px rgba(0,221,221,.2)}
.meta-icon svg{width:16px;height:16px;stroke:var(--teal);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.meta-text{display:flex;flex-direction:column}
.meta-text small{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:1px}
.meta-text a{font-size:.85rem;font-weight:500;color:var(--on-surface);text-decoration:none;transition:color .3s ease}
.meta-text a:hover{color:var(--teal)}
.contact-form{display:flex;flex-direction:column;gap:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.form-field input,.form-field textarea{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:.75rem 1rem;color:var(--on-surface);font-family:'Inter',sans-serif;font-size:.87rem;outline:none;transition:border-color .3s ease,box-shadow .3s ease,background .3s ease;cursor:none}
.form-field input::placeholder,.form-field textarea::placeholder{color:rgba(255,255,255,.18)}
.form-field input:focus,.form-field textarea:focus{border-color:rgba(0,221,221,.45);box-shadow:0 0 0 3px rgba(0,221,221,.08),0 0 20px rgba(0,221,221,.05);background:rgba(0,221,221,.02)}
.form-field textarea{resize:vertical;min-height:130px}
.btn-submit{width:100%;background:var(--teal);color:#000;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:700;padding:.875rem;border:none;border-radius:8px;cursor:none;letter-spacing:.03em;position:relative;overflow:hidden;transition:box-shadow .35s ease,transform .35s ease}
.btn-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-100%)}
.btn-submit:hover::before{animation:shimmer .55s ease forwards}
.btn-submit:hover{box-shadow:0 0 30px rgba(0,221,221,.55);transform:translateY(-2px)}

/* ── FOOTER ── */
footer{background:var(--bg);border-top:1px solid rgba(255,255,255,.06);padding:1.5rem 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;position:relative}
footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,221,221,.3),rgba(192,132,252,.3),transparent)}
.footer-logo{font-weight:900;font-size:1rem;color:var(--teal);letter-spacing:.06em}
footer p{font-size:.78rem;color:var(--muted)}
.footer-links{display:flex;gap:1.5rem;list-style:none}
.footer-links a{font-size:.8rem;color:var(--muted);text-decoration:none;transition:color .3s ease}
.footer-links a:hover{color:var(--teal)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .4s var(--ease)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{position:relative;width:100%;max-width:900px;background:var(--card2);border-radius:16px;overflow:hidden;border:1px solid rgba(0,221,221,.15);transform:scale(.92) translateY(30px);transition:transform .5s var(--ease);box-shadow:0 0 100px rgba(0,0,0,.8),0 0 40px rgba(0,221,221,.08)}
.modal-overlay.open .modal-box{transform:scale(1) translateY(0)}
.modal-video-wrap{position:relative;padding-top:56.25%;background:#000}
.modal-video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.modal-footer{padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.modal-title{font-size:1rem;font-weight:700;color:var(--on-surface);margin-bottom:3px}
.modal-desc{font-size:.78rem;color:var(--muted);line-height:1.55}
.modal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);cursor:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s ease,border-color .3s ease,box-shadow .3s ease}
.modal-close:hover{background:rgba(0,221,221,.15);border-color:var(--teal);box-shadow:0 0 14px rgba(0,221,221,.3)}
.modal-close svg{width:14px;height:14px;stroke:var(--on-surface);fill:none;stroke-width:2;stroke-linecap:round}

/* ── Portrait Cards (9:16 Reels / Shorts) ── */
.project-card.is-portrait .card-thumb{padding-top:177.77%}
.project-card.is-portrait .card-thumb img{object-position:center top}

/* ── Portrait Modal ── */
.modal-overlay.is-portrait .modal-box{max-width:420px}
.modal-overlay.is-portrait .modal-video-wrap{padding-top:177.77%}

/* ── Responsive ── */
@media(max-width:900px){.hero-inner{grid-template-columns:1fr;text-align:center;padding:60px 24px 50px}.hero-right{display:none}.hero-btns{justify-content:center}.available-badge{margin:0 auto}nav{padding:0 24px}.works-section,.collab-section,.contact-section{padding:60px 24px}footer{padding:1.5rem 24px}.portfolio-grid{grid-template-columns:repeat(2,1fr)}.contact-inner{grid-template-columns:1fr;gap:2.5rem}}
@media(max-width:600px){.nav-links{display:none}.form-row{grid-template-columns:1fr}.portfolio-grid{grid-template-columns:1fr}.collab-card{max-width:100%}body{cursor:auto}#cursor-dot,#cursor-ring{display:none}}
  </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<canvas id="particleCanvas"></canvas>

<nav id="siteNav">
  <a href="#home" class="nav-logo" id="navLogo"></a>
  <ul class="nav-links" id="navLinks"></ul>
  <a class="nav-cta" id="navCta"></a>
</nav>

<section class="hero" id="home">
  <div class="hero-hexgrid"></div>
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>
  <div class="hero-sweep"></div>
  <div class="hero-inner">
    <div class="hero-left">
      <div class="available-badge" id="heroBadge"></div>
      <h1 class="hero-name" id="heroName"></h1>
      <div class="hero-roles" id="heroRoles"></div>
      <div class="hero-btns" id="heroBtns"></div>
    </div>
    <div class="hero-right">
      <div class="hero-img-wrap" id="heroImgWrap"></div>
    </div>
  </div>
</section>

<section class="works-section" id="portfolio">
  <div class="works-header">
    <div class="works-header-left reveal">
      <h2>Selected <span class="purple">Works</span></h2>
      <p>A curated collection of visual narratives, ranging from high-energy commercial edits to atmospheric cinematic motion pieces.</p>
    </div>
    <div class="filter-bar reveal" id="filterBar"></div>
  </div>
  <div class="portfolio-grid" id="portfolioGrid"></div>
</section>

<section class="collab-section" id="about">
  <h2 id="collabHeading" class="reveal"></h2>
  <p id="collabSubtext" class="reveal"></p>
  <div class="collab-grid" id="collabGrid"></div>
</section>

<section class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-left reveal-left">
      <h2 id="contactHeading"></h2>
      <p id="contactSubtext"></p>
      <div class="contact-meta">
        <div class="contact-meta-item">
          <div class="meta-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div class="meta-text">
            <small>Email</small>
            <a id="contactEmail" href="#"></a>
          </div>
        </div>
      </div>
    </div>
    <form class="contact-form reveal-right" onsubmit="handleSubmit(event)">
      <div class="form-row">
        <div class="form-field"><label id="labelName" for="fname"></label><input type="text" id="fname" required /></div>
        <div class="form-field"><label id="labelEmail" for="femail"></label><input type="email" id="femail" required /></div>
      </div>
      <div class="form-field"><label id="labelMessage" for="fmessage"></label><textarea id="fmessage" required></textarea></div>
      <button type="submit" class="btn-submit" id="submitBtn"></button>
    </form>
  </div>
</section>

<footer>
  <span class="footer-logo" id="footerLogo"></span>
  <p id="footerCopyright"></p>
  <ul class="footer-links" id="footerLinks"></ul>
</footer>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-video-wrap">
      <iframe id="modalIframe" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" title="Project video"></iframe>
    </div>
    <div class="modal-footer">
      <div><p class="modal-title" id="modalTitle"></p><p class="modal-desc" id="modalDesc"></p></div>
      <button class="modal-close" id="modalClose" aria-label="Close video">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="site-content.js"></script>
<script>
/* ═══ PARTICLE SYSTEM ════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('particleCanvas'),ctx=cv.getContext('2d');
  let W,H,pts=[],mouse={x:-999,y:-999};
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
  resize();window.addEventListener('resize',resize,{passive:true});
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY},{passive:true});
  const COLS=['rgba(0,221,221,','rgba(192,132,252,','rgba(0,180,200,'];
  const N=Math.min(90,Math.floor(innerWidth/18));
  for(let i=0;i<N;i++) pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.4+.4,col:COLS[Math.floor(Math.random()*COLS.length)],a:Math.random()*.45+.15,ph:Math.random()*Math.PI*2,ps:Math.random()*.018+.007});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.ph+=p.ps;
      const a=p.a+Math.sin(p.ph)*.1;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      const dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){const f=(130-d)/130;p.x+=dx/d*f*1.8;p.y+=dy/d*f*1.8}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col+a+')';ctx.fill();
    });
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const a=pts[i],b=pts[j],d=Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
      if(d<95){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle='rgba(0,221,221,'+(0.07*(1-d/95))+')';ctx.lineWidth=.5;ctx.stroke()}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══ CUSTOM CURSOR ══════════════════════════════════════════ */
(function(){
  const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
  let rx=0,ry=0,mx=0,my=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY},{passive:true});
  const hoverTargets='a,button,.project-card,.chip,.collab-card';
  document.addEventListener('mouseover',e=>{if(e.target.closest(hoverTargets))ring.classList.add('big')});
  document.addEventListener('mouseout', e=>{if(e.target.closest(hoverTargets))ring.classList.remove('big')});
  document.addEventListener('mousedown',()=>{dot.style.transform='translate(-50%,-50%) scale(.6)'});
  document.addEventListener('mouseup',  ()=>{dot.style.transform='translate(-50%,-50%) scale(1)'});
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;dot.style.left=mx+'px';dot.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();
})();

/* ═══ SCROLL REVEAL ══════════════════════════════════════════ */
const revObs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.1});
function observeAll(){document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale').forEach(el=>revObs.observe(el))}

/* ═══ ROLE CYCLING ═══════════════════════════════════════════ */
function startRoleCycle(){
  const spans=[...document.querySelectorAll('.hero-roles span')];
  if(!spans.length)return;
  let idx=0;
  spans[0].classList.add('highlight');
  setInterval(()=>{spans.forEach(s=>s.classList.remove('highlight'));idx=(idx+1)%spans.length;spans[idx].classList.add('highlight')},2400);
}

/* ═══ CARD TILT ══════════════════════════════════════════════ */
function initTilt(){
  document.querySelectorAll('.project-card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
      card.style.transform=`perspective(700px) rotateY(${x*10}deg) rotateX(${-y*10}deg) translateY(-6px)`;
    });
    card.addEventListener('mouseleave',()=>{card.style.transform=''});
  });
}

/* ═══ NAV SCROLL ═════════════════════════════════════════════ */
window.addEventListener('scroll',()=>{document.querySelector('nav').classList.toggle('scrolled',scrollY>40)},{passive:true});

/* ═══ ICONS ══════════════════════════════════════════════════ */
const ICONS={
  eye:    `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
  refresh:`<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.07"/>`,
  zap:    `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
  award:  `<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>`,
  message:`<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`
};

/* ═══ 1. NAV ══════════════════════════════════════════════════ */
document.getElementById('navLogo').textContent=SITE_NAV.logoText;
document.getElementById('footerLogo').textContent=SITE_NAV.logoText;
const navCta=document.getElementById('navCta');
navCta.textContent=SITE_NAV.ctaLabel;navCta.href=SITE_NAV.ctaHref;
SITE_NAV.links.forEach((link,i)=>{
  const li=document.createElement('li');
  li.innerHTML=`<a href="${link.href}"${i===0?' class="active"':''}>${link.label}</a>`;
  document.getElementById('navLinks').appendChild(li);
});

/* ═══ 2. HERO ════════════════════════════════════════════════ */
document.getElementById('heroBadge').textContent=SITE_HERO.badgeText;
document.getElementById('heroName').innerHTML=`${SITE_HERO.firstName} <span class="teal" data-text="${SITE_HERO.lastName}">${SITE_HERO.lastName}</span>`;
SITE_HERO.roles.forEach(role=>{const s=document.createElement('span');s.textContent=role;document.getElementById('heroRoles').appendChild(s)});
document.getElementById('heroBtns').innerHTML=`<a href="${SITE_HERO.primaryBtn.href}" class="btn-teal">${SITE_HERO.primaryBtn.label}</a><a href="${SITE_HERO.secondaryBtn.href}" class="btn-outline">${SITE_HERO.secondaryBtn.label}</a>`;
const imgWrap=document.getElementById('heroImgWrap');
if(SITE_HERO.heroImage){imgWrap.innerHTML=`<img src="${SITE_HERO.heroImage}" alt="${SITE_HERO.firstName} ${SITE_HERO.lastName}'s editing setup" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'hero-img-placeholder\\'><span>Add your hero image in site-content.js<br><small style=\\'color:#00dddd\\'>heroImage: \\'hero.png\\'</small></span></div>'"/>`}
else{imgWrap.innerHTML=`<div class="hero-img-placeholder"><span>Set heroImage in site-content.js<br><small style="color:#00dddd">e.g. heroImage: 'hero.png'</small></span></div>`}

/* ═══ 3. FILTERS ═════════════════════════════════════════════ */
function buildFilters(){
  const bar=document.getElementById('filterBar');
  ['All',...new Set(SITE_PROJECTS.map(p=>p.category))].forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='chip'+(cat==='All'?' active':'');btn.textContent=cat;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));btn.classList.add('active');
      document.querySelectorAll('.project-card').forEach(c=>c.classList.toggle('hidden',cat!=='All'&&c.dataset.category!==cat));
    });
    bar.appendChild(btn);
  });
}

/* ═══ 4. CARDS ═══════════════════════════════════════════════ */
function buildCards(){
  const grid=document.getElementById('portfolioGrid');grid.innerHTML='';
  SITE_PROJECTS.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='project-card reveal-scale'+(p.aspectRatio==='portrait'?' is-portrait':'');card.dataset.category=p.category;
    card.setAttribute('role','button');card.setAttribute('tabindex','0');card.setAttribute('aria-label','Play '+p.title);
    card.style.transitionDelay=(i%3)*.09+'s';
    const thumb=p.thumbnail?`<img src="${p.thumbnail}" alt="${p.title}" loading="lazy"/>`:`<div class="thumb-ph"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,221,221,0.2)" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>`;
    card.innerHTML=`<div class="card-thumb">${thumb}<span class="card-badge">${p.category}</span><div class="card-play-overlay"><div class="play-btn-circle"><svg viewBox="0 0 24 24" fill="var(--teal)"><path d="M5 3l14 9-14 9V3z"/></svg></div></div></div><div class="card-body"><p class="card-title">${p.title}</p><p class="card-desc">${p.description}</p></div>`;
    card.addEventListener('click',()=>openModal(i));
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openModal(i)});
    grid.appendChild(card);
  });
  initTilt();observeAll();
}

/* ═══ 5. COLLAB ══════════════════════════════════════════════ */
function buildCollab(){
  const accent=SITE_COLLAB.accentWord;
  document.getElementById('collabHeading').innerHTML=SITE_COLLAB.heading.replace(accent,`<span class="teal">${accent}</span>`);
  document.getElementById('collabSubtext').textContent=SITE_COLLAB.subtext;
  const grid=document.getElementById('collabGrid');
  SITE_COLLAB.cards.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='collab-card reveal'+(i===SITE_COLLAB.highlight?' highlighted':'');
    el.style.transitionDelay=(i*.09)+'s';
    el.innerHTML=`<div class="collab-icon"><svg viewBox="0 0 24 24">${ICONS[c.icon]||''}</svg></div><h3>${c.title}</h3><p>${c.text}</p>`;
    grid.appendChild(el);
  });
}

/* ═══ 6. CONTACT ═════════════════════════════════════════════ */
function buildContact(){
  const c=SITE_CONTACT;
  document.getElementById('contactHeading').innerHTML=`${c.heading}<br><span class="teal">${c.accentLine}</span>`;
  document.getElementById('contactSubtext').textContent=c.subtext;
  const em=document.getElementById('contactEmail');em.href='mailto:'+c.email;em.textContent=c.email;
  document.getElementById('labelName').textContent=c.formLabels.name;
  document.getElementById('labelEmail').textContent=c.formLabels.email;
  document.getElementById('labelMessage').textContent=c.formLabels.message;
  document.getElementById('fname').placeholder=c.formPlaceholders.name;
  document.getElementById('femail').placeholder=c.formPlaceholders.email;
  document.getElementById('fmessage').placeholder=c.formPlaceholders.message;
  document.getElementById('submitBtn').textContent=c.submitLabel;
}

/* ═══ 7. FOOTER ══════════════════════════════════════════════ */
function buildFooter(){
  document.getElementById('footerCopyright').textContent=SITE_FOOTER.copyright;
  const ul=document.getElementById('footerLinks');
  SITE_FOOTER.links.forEach(l=>{const li=document.createElement('li');li.innerHTML=`<a href="${l.href}">${l.label}</a>`;ul.appendChild(li)});
}

/* ═══ 8. MODAL ═══════════════════════════════════════════════ */
const overlay=document.getElementById('modalOverlay'),iframe=document.getElementById('modalIframe'),modalTitle=document.getElementById('modalTitle'),modalDesc=document.getElementById('modalDesc');
function openModal(i){const p=SITE_PROJECTS[i];iframe.src=p.videoUrl+'?autoplay=1&rel=0';modalTitle.textContent=p.title;modalDesc.textContent=p.description;overlay.classList.toggle('is-portrait',p.aspectRatio==='portrait');overlay.classList.add('open');document.body.style.overflow='hidden'}
function closeModal(){overlay.classList.remove('open');iframe.src='';document.body.style.overflow=''}
document.getElementById('modalClose').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ═══ 9. FORM ════════════════════════════════════════════════ */
function handleSubmit(e){
  e.preventDefault();const btn=document.getElementById('submitBtn'),orig=btn.textContent;
  btn.textContent='Message sent!';btn.style.background='#00aaaa';btn.style.pointerEvents='none';
  setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.pointerEvents='';e.target.reset()},3000);
}

/* ═══ 10. NAV ACTIVE SCROLL ══════════════════════════════════ */
function updateNav(){
  const ids=SITE_NAV.links.map(l=>l.href.replace('#',''));let current=ids[0];
  ids.forEach(id=>{const el=document.getElementById(id);if(el&&scrollY>=el.offsetTop-80)current=id});
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+current));
}
window.addEventListener('scroll',updateNav,{passive:true});

/* ═══ INIT ═══════════════════════════════════════════════════ */
buildFilters();buildCards();buildCollab();buildContact();buildFooter();observeAll();startRoleCycle();
</script>
</body>
</html>
